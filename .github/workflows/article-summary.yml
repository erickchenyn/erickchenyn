name: article-summary

on:
  push:
    branches:
      - main
    paths:
      - "articles/**"
      - ".github/workflows/article-summary.yml"

jobs:
  article-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get latest commit SHA
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Generate README.md
        run: |
          echo "# Read It Later" > README.md
          echo "" >> README.md

          for date_dir in $(ls -rd articles/*/); do
            date=$(basename "$date_dir")
            echo "- **$date**" >> README.md

            for md_file in "$date_dir"*.md; do
              [ -f "$md_file" ] || continue
              title=$(head -20 "$md_file" | grep '^# ' | head -1 | sed 's/^# //')
              if [ -n "$title" ]; then
                echo "  - [$title]($md_file)" >> README.md
              fi
            done
          done

          echo "" >> README.md
          echo "---" >> README.md
          echo "" >> README.md
          echo "*This document was automatically generated based on commit [\`${{ steps.commit.outputs.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ steps.commit.outputs.sha }}).*" >> README.md
      - name: Check for changes
        id: changes
        run: |
          if [ ! -f README.md ] || ! git diff --quiet README.md || git ls-files --others --exclude-standard | grep -q "^README.md$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "noreply@anthropic.com"
          git config --local user.name "Claude"
          git add README.md
          git commit -m "docs: auto summary (${{ steps.commit.outputs.sha }})"
          git pull --rebase
          git push
