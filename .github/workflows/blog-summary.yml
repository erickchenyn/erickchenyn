name: blog-summary

on:
  push:
    branches:
      - main
    paths:
      - "blog/*"
      - ".github/workflows/blog-summary.yml"
  workflow_dispatch:

jobs:
  blog-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get latest commit SHA
        id: commit
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Generate BLOG.md
        run: |
          echo "# Blog" > BLOG.md
          echo "" >> BLOG.md

          for file in $(ls -t blog/* 2>/dev/null); do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            echo "- [$name]($file)" >> BLOG.md
          done

          echo "" >> BLOG.md
          echo "---" >> BLOG.md
          echo "" >> BLOG.md
          echo "*This document was automatically generated based on commit [\`${{ steps.commit.outputs.sha }}\`](https://github.com/${{ github.repository }}/commit/${{ steps.commit.outputs.sha }}).*" >> BLOG.md
      - name: Check for changes
        id: changes
        run: |
          if [ ! -f BLOG.md ] || ! git diff --quiet BLOG.md || git ls-files --others --exclude-standard | grep -q "^BLOG.md$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "noreply@anthropic.com"
          git config --local user.name "Claude"
          git add BLOG.md
          git commit -m "docs: auto summary (${{ steps.commit.outputs.sha }})"
          git pull --rebase
          git push
